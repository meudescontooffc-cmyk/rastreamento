<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- RESPONSIVO CORRETO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Painel Empresa</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<button onclick="sair()" class="btn">Sair</button>
<h2>Procurar Usuário</h2>

<div class="codigo">

  <!-- ESTADO -->
  <div class="estado-box">

    <input 
      id="estado" 
      maxlength="2" 
      placeholder="UF"
      autocomplete="off"
      inputmode="text"
    >

    <select id="listaEstados">
      <option value="">UF</option>
      <option>AC</option>
      <option>AL</option>
      <option>AP</option>
      <option>AM</option>
      <option>BA</option>
      <option>CE</option>
      <option>DF</option>
      <option>ES</option>
      <option>GO</option>
      <option>MA</option>
      <option>MT</option>
      <option>MS</option>
      <option>MG</option>
      <option>PA</option>
      <option>PB</option>
      <option>PR</option>
      <option>PE</option>
      <option>PI</option>
      <option>RJ</option>
      <option>RN</option>
      <option>RS</option>
      <option>RO</option>
      <option>RR</option>
      <option>SC</option>
      <option>SP</option>
      <option>SE</option>
      <option>TO</option>
    </select>

  </div>

  <span class="traco">-</span>

  <!-- NÚMEROS -->
  <input id="c1" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
  <input id="c2" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
  <input id="c3" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
  <input id="c4" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
  <input id="c5" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
  <input id="c6" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">

</div>

<button class="btn" onclick="buscar()">Procurar usuário</button>

<div class="linha"></div>

<div id="resultado">

  <p id="msg"></p>

 <div class="card" id="card" style="display:none;">

    <div class="card-content">
      <img id="foto" src="" alt="Foto do cliente" loading="lazy">

      <div class="info">
        <h3 id="nome">Nome</h3>
        <p id="status" class="status">Status</p>
        <p id="id">ID</p>
      </div>
    </div>

    <button class="btn" onclick="validar()">Validar benefício</button>

  </div>

</div>

<div class="sucesso" id="sucesso" style="display:none;">
  <h1>Benefício validado ✅</h1>

  <button class="btn" onclick="voltar()">Voltar</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
